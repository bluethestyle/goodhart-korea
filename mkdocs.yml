site_name: "한국 정부 재정 굿하트 효과"
site_description: "Multi-method robustness analysis of Goodhart's Law in Korean public spending"
site_url: "https://bluethestyle.github.io/goodhart-korea/"
repo_url: "https://github.com/bluethestyle/goodhart-korea"
repo_name: "bluethestyle/goodhart-korea"
edit_uri: ""

# README.md는 별도 데이터 명세서 — index.md와 별개. 사이트 빌드에서 제외.
exclude_docs: |
  README.md

# strict 모드 유지하면서 docs/ 외부 참조 같은 노이즈 warning은 무시
validation:
  nav:
    omitted_files: ignore        # nav에 안 적힌 docs/ 파일 (kodas/, openapi/ 등) 무시
    not_found: ignore            # nav에서 가리키는 파일이 docs/ 외부일 때 무시
    absolute_links: ignore
  links:
    not_found: ignore            # docs/ 외부 경로(../data/figs/...) 참조 무시
    absolute_links: ignore
    unrecognized_links: ignore
    anchors: ignore              # 자동 ID와 미세한 차이 무시

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - md_in_html

plugins:
  - search:
      lang:
        - ko
        - en

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - 분석 여정 (JOURNEY):
    - "전체 여정": analysis/JOURNEY.md
  - 핵심 결과:
    - "Findings": findings.md
    - "방법론": methods.md
    - "한계": limitations.md
  - 인터랙티브 시각화:
    - "Overview": interactive/index.md
  - 데이터:
    - "출처 (SOURCES)": https://github.com/bluethestyle/goodhart-korea/blob/main/data/external/SOURCES.md
    - "결과 CSV (INDEX)": https://github.com/bluethestyle/goodhart-korea/blob/main/data/results/INDEX.md
  - 참고문헌: REFERENCES.md
